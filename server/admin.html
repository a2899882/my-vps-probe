<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>探针中枢管理台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<!-- SortableJS 拖拽排序 -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:#080c14;color:#e2e8f0;min-height:100vh;padding:20px}
.mono{font-family:'JetBrains Mono',monospace}
.glass{background:rgba(255,255,255,0.038);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.075);border-radius:14px}
.glass2{background:rgba(255,255,255,0.022);border:1px solid rgba(255,255,255,0.06);border-radius:11px}
.inp{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:7px 11px;color:#e2e8f0;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.inp:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.14)}
.inp::placeholder{color:rgba(148,163,184,0.3)}
.lbl{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;display:block}
.btn-save{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:800;font-size:13px;padding:10px 24px;border-radius:10px;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(99,102,241,0.3);display:inline-flex;align-items:center;gap:7px;transition:opacity 0.18s,transform 0.12s}
.btn-save:hover{opacity:0.88;transform:translateY(-1px)}
.btn-save:active{transform:translateY(0)}
.btn-add{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.18s;border:1px solid transparent}
.btn-blue{background:rgba(99,102,241,0.1);color:#818cf8;border-color:rgba(99,102,241,0.25)}
.btn-blue:hover{background:rgba(99,102,241,0.2);border-color:rgba(99,102,241,0.45)}
.btn-green{background:rgba(16,185,129,0.09);color:#34d399;border-color:rgba(16,185,129,0.25)}
.btn-green:hover{background:rgba(16,185,129,0.18);border-color:rgba(16,185,129,0.45)}
.btn-del{background:transparent;border:1px solid rgba(239,68,68,0.18);color:#f87171;padding:4px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;transition:all 0.18s}
.btn-del:hover{background:rgba(239,68,68,0.14);border-color:rgba(239,68,68,0.4)}
.btn-copy{background:transparent;border:1px solid rgba(99,102,241,0.2);color:#818cf8;padding:4px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;transition:all 0.18s}
.btn-copy:hover{background:rgba(99,102,241,0.12)}
/* ★ 节点卡片：横向流式布局，每行多卡片 */
.node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.node-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:15px;transition:border-color 0.2s,box-shadow 0.2s}
.node-card:hover{border-color:rgba(99,102,241,0.35);box-shadow:0 4px 20px rgba(99,102,241,0.1)}
/* 拖拽把手 */
.drag-handle{cursor:grab;color:rgba(148,163,184,0.35);transition:color 0.18s;display:flex;align-items:center}
.drag-handle:hover{color:rgba(148,163,184,0.8)}
.drag-handle:active{cursor:grabbing}
.sortable-ghost{opacity:0.35;border:2px dashed rgba(99,102,241,0.5)!important}
.sortable-chosen{box-shadow:0 8px 30px rgba(99,102,241,0.2)!important}
/* Ping 目标卡片 */
.ping-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ping-card{background:rgba(255,255,255,0.028);border:1px solid rgba(255,255,255,0.065);border-radius:10px;padding:12px}
.divider{border-color:rgba(255,255,255,0.07)}
/* Toast */
.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:10px;font-weight:700;font-size:13px;z-index:9999;animation:toastIn 0.3s ease;pointer-events:none}
.toast-ok{background:rgba(16,185,129,0.9);color:#fff}
.toast-err{background:rgba(239,68,68,0.9);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* 一键部署 code block */
.deploy-code{background:rgba(0,0,0,0.4);border:1px solid rgba(99,102,241,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:#a5b4fc;word-break:break-all;line-height:1.6;font-family:'JetBrains Mono',monospace;max-height:80px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
</style>
</head>
<body>
<div id="app" class="w-full max-w-[1300px] mx-auto">

  <!-- 顶部栏 -->
  <div class="glass flex items-center justify-between px-6 py-4 mb-5">
    <div class="flex items-center gap-3">
      <svg width="22" height="22" fill="none" stroke="#6366f1" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="text-[17px] font-black tracking-widest" style="color:#e2e8f0">探针中枢管理台</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="/" class="btn-add btn-blue text-[12px]">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        返回前端首页
      </a>
      <button @click="saveConfig" class="btn-save">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        保存并动态下发配置
      </button>
    </div>
  </div>

  <!-- 基础配置 -->
  <div class="glass p-5 mb-5">
    <div class="text-[11px] font-black uppercase tracking-widest mb-4" style="color:#6366f1">⚙️ 基础配置</div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div><label class="lbl">网站标题名称</label><input class="inp" v-model="cfg.site_name" placeholder="T小K的VPS"/></div>
      <div><label class="lbl">后台登录账号</label><input class="inp" v-model="cfg.admin_user" placeholder="admin"/></div>
      <div><label class="lbl">后台登录密码</label><input class="inp" type="password" v-model="cfg.admin_pass" placeholder="留空则不修改密码"/></div>
    </div>
  </div>

  <!-- 主内容：左右两栏 -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

    <!-- 左：被控节点管理（占2格） -->
    <div class="lg:col-span-2">
      <div class="glass p-5">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <span class="text-[11px] font-black uppercase tracking-widest" style="color:#818cf8">🖥 被控节点 (小鸡) 管理</span>
            <span class="px-2 py-0.5 rounded-full text-[9px] font-black mono" style="background:rgba(99,102,241,0.15);color:#818cf8">{{ cfg.nodes.length }} 台</span>
          </div>
          <button @click="addNode" class="btn-add btn-blue">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/></svg>
            新增节点
          </button>
        </div>

        <!-- 提示：可拖拽排序 -->
        <div class="text-[10px] mb-3 flex items-center gap-1.5" style="color:rgba(148,163,184,0.5)">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="7" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="17" r="1"/><circle cx="15" cy="7" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="17" r="1"/></svg>
          拖拽左侧把手可调整节点顺序
        </div>

        <!-- ★ 节点网格（可拖拽）★ -->
        <div id="node-sortable" class="node-grid">
          <div v-for="(node,idx) in cfg.nodes" :key="node.id" class="node-card" :data-id="node.id">
            <!-- 卡片头 -->
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <!-- 拖拽把手 -->
                <div class="drag-handle" title="拖拽排序">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="7" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="9" cy="17" r="1.5"/><circle cx="15" cy="7" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="15" cy="17" r="1.5"/></svg>
                </div>
                <span class="text-[10px] mono px-2 py-0.5 rounded-full font-black" style="background:rgba(99,102,241,0.12);color:#818cf8">
                  #{{ idx+1 }}
                </span>
                <span class="text-[12px] font-black" style="color:#e2e8f0">{{ node.name||'未命名节点' }}</span>
              </div>
              <div class="flex items-center gap-1.5">
                <button @click="copyDeploy(node)" class="btn-copy" title="复制一键部署命令">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  部署命令
                </button>
                <button @click="removeNode(idx)" class="btn-del">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                  删除
                </button>
              </div>
            </div>

            <!-- 字段 -->
            <div class="space-y-2.5">
              <div class="grid grid-cols-2 gap-2">
                <div>
                  <label class="lbl">节点 ID (唯一)</label>
                  <input class="inp mono" v-model="node.id" placeholder="node-xxxxxxxx" readonly style="opacity:0.7;cursor:not-allowed"/>
                </div>
                <div>
                  <label class="lbl">显示名称</label>
                  <input class="inp" v-model="node.name" placeholder="如: JP-01"/>
                </div>
              </div>
              <div>
                <label class="lbl">通信 Token</label>
                <input class="inp mono" v-model="node.token" placeholder="secret_xxxx"/>
              </div>
              <div class="grid grid-cols-2 gap-2">
                <div>
                  <label class="lbl">到期时间</label>
                  <input class="inp mono" v-model="node._ed" placeholder="2027/01/01"/>
                </div>
                <div>
                  <label class="lbl">月流量上限 (GB, 0=不限)</label>
                  <input class="inp mono" type="number" v-model.number="node._tl" placeholder="0" min="0"/>
                </div>
              </div>
            </div>

            <!-- 一键部署命令预览 -->
            <div class="mt-3">
              <div class="lbl mb-1.5">一键部署命令</div>
              <div class="deploy-code" :title="deployCmd(node)">{{ deployCmd(node) }}</div>
            </div>
          </div>
        </div>

        <div v-if="cfg.nodes.length===0" class="text-center py-10" style="color:rgba(148,163,184,0.4)">
          <svg class="mx-auto mb-3" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          <div class="text-[13px] font-bold">暂无节点，点击「新增节点」添加</div>
        </div>
      </div>
    </div>

    <!-- 右：Ping 监测目标（占1格） -->
    <div class="lg:col-span-1">
      <div class="glass p-5 h-full">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <span class="text-[11px] font-black uppercase tracking-widest" style="color:#34d399">🌐 全局 Ping 监测目标</span>
            <span class="px-2 py-0.5 rounded-full text-[9px] font-black mono" style="background:rgba(16,185,129,0.12);color:#34d399">{{ cfg.ping_tasks.length }} 个</span>
          </div>
          <button @click="addPing" class="btn-add btn-green">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/></svg>
            新增目标
          </button>
        </div>
        <div class="text-[10px] mb-3" style="color:rgba(148,163,184,0.4)">TCP连接探测，端口默认 :80</div>

        <div class="space-y-2.5">
          <div v-for="(task,idx) in cfg.ping_tasks" :key="idx" class="ping-card">
            <div class="flex items-center justify-between mb-2.5">
              <span class="text-[11px] font-black" style="color:#34d399">目标 #{{ idx+1 }}</span>
              <button @click="removePing(idx)" class="btn-del" style="padding:3px 8px;font-size:10px">✕ 删除</button>
            </div>
            <div class="space-y-2">
              <div><label class="lbl">目标名称</label><input class="inp" v-model="task.name" placeholder="广东电信"/></div>
              <div><label class="lbl">IP 或域名</label><input class="inp mono" v-model="task.host" placeholder="gd-ct-v4.ip.zstaticcdn.com"/></div>
            </div>
          </div>
        </div>

        <div v-if="cfg.ping_tasks.length===0" class="text-center py-8" style="color:rgba(148,163,184,0.35)">
          <div class="text-[12px] font-bold">暂无监测目标</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div v-if="toast.show" :class="['toast', toast.ok?'toast-ok':'toast-err']">{{ toast.msg }}</div>
</div>

<script>
const{createApp,ref,reactive,onMounted,nextTick}=Vue;
createApp({
  setup(){
    const cfg=reactive({site_name:'',admin_user:'',admin_pass:'',nodes:[],ping_tasks:[]});
    const toast=reactive({show:false,ok:true,msg:''});
    let sortable=null;

    const showToast=(msg,ok=true)=>{toast.msg=msg;toast.ok=ok;toast.show=true;setTimeout(()=>toast.show=false,3000)};

    /* 生成唯一ID */
    const genId=()=>'node-'+Date.now()+Math.floor(Math.random()*10000);

    /* 从 expire_date 字段拆分，读取时解析，写入时重新合并 */
    const loadCfg=async()=>{
      try{
        const r=await fetch('/api/admin/config',{headers:{Authorization:'Basic '+btoa((cfg.admin_user||'admin')+':'+(cfg.admin_pass||''))}});
        if(r.status===401){showToast('认证失败，请刷新页面重新登录',false);return;}
        const d=await r.json();
        cfg.site_name=d.site_name||'';
        cfg.admin_user=d.admin_user||'admin';
        cfg.ping_tasks=(d.ping_tasks||[]).map(t=>({name:t.name,host:t.host}));
        cfg.nodes=(d.nodes||[]).map(n=>{
          // 解析 expire_date: "2027/01/01|1000"
          let ed='2027/01/01',tl=0;
          const raw=String(n.expire_date||'');
          if(raw.includes('|')){const p=raw.split('|');ed=p[0]||'2027/01/01';tl=parseInt(p[1])||0;}
          else{ed=raw||'2027/01/01';}
          return{id:n.id||genId(),name:n.name||'',token:n.token||'',_ed:ed,_tl:tl};
        });
        await nextTick();
        initSortable();
      }catch(e){showToast('加载配置失败: '+e.message,false);}
    };

    const saveConfig=async()=>{
      try{
        // 合并 _ed 和 _tl 回 expire_date
        const nodes=cfg.nodes.map(n=>({
          id:n.id,name:n.name,token:n.token,
          expire_date:n._tl>0?`${n._ed}|${n._tl}`:n._ed
        }));
        const payload={site_name:cfg.site_name,admin_user:cfg.admin_user,admin_pass:cfg.admin_pass||'',nodes,ping_tasks:cfg.ping_tasks};
        const r=await fetch('/api/admin/config',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Basic '+btoa((cfg.admin_user||'admin')+':'+(cfg.admin_pass||''))},body:JSON.stringify(payload)});
        if(r.ok)showToast('✅ 配置已保存并下发！');
        else showToast('❌ 保存失败: '+r.status,false);
      }catch(e){showToast('❌ 请求失败: '+e.message,false);}
    };

    const addNode=()=>{
      cfg.nodes.push({id:genId(),name:'',token:'secret_'+Math.random().toString(36).slice(2,8),_ed:'2027/01/01',_tl:0});
      nextTick(()=>initSortable());
    };
    const removeNode=idx=>cfg.nodes.splice(idx,1);
    const addPing=()=>cfg.ping_tasks.push({name:'',host:''});
    const removePing=idx=>cfg.ping_tasks.splice(idx,1);

    /* 一键部署命令 */
    const deployCmd=node=>`curl -sL https://tz.shell.kdns.fr/install.sh?t=${node.id.replace('node-','')} | bash -s -- -s https://tz.shell.kdns.fr -t ${node.token}`;

    /* 复制部署命令 */
    const copyDeploy=node=>{
      navigator.clipboard.writeText(deployCmd(node)).then(()=>showToast('✅ 部署命令已复制！')).catch(()=>showToast('❌ 复制失败',false));
    };

    /* SortableJS 拖拽排序 */
    const initSortable=()=>{
      const el=document.getElementById('node-sortable');
      if(!el)return;
      if(sortable)sortable.destroy();
      sortable=Sortable.create(el,{
        handle:'.drag-handle',
        animation:180,
        ghostClass:'sortable-ghost',
        chosenClass:'sortable-chosen',
        onEnd:(e)=>{
          const moved=cfg.nodes.splice(e.oldIndex,1)[0];
          cfg.nodes.splice(e.newIndex,0,moved);
        }
      });
    };

    onMounted(()=>{
      // 从 URL 参数或 basic auth 获取凭据
      const params=new URLSearchParams(location.search);
      if(params.get('user'))cfg.admin_user=params.get('user');
      if(params.get('pass'))cfg.admin_pass=params.get('pass');
      loadCfg();
    });

    return{cfg,toast,saveConfig,addNode,removeNode,addPing,removePing,deployCmd,copyDeploy};
  }
}).mount('#app');
</script>
</body>
</html>
