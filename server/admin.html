<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探针管理中心</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-5xl mx-auto">
        <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 pb-4 border-b border-gray-800 gap-4">
            <h1 class="text-2xl font-bold flex items-center gap-2">⚙️ 探针中枢管理台</h1>
            <div class="flex items-center gap-3">
                <a href="/" target="_blank" class="text-indigo-400 hover:text-indigo-300 text-sm font-bold flex items-center gap-1">👉 返回前端首页</a>
                <button @click="saveConfig" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-bold shadow-lg transition">💾 保存并动态下发配置</button>
            </div>
        </header>

        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 mb-6 flex flex-wrap gap-4 items-end">
            <div class="w-full sm:w-auto"><label class="text-xs text-gray-500 block mb-1">网站标题名称</label><input v-model="config.site_name" class="bg-gray-900 border border-gray-600 rounded px-3 py-1.5 text-sm text-white outline-none w-full"></div>
            <div class="w-full sm:w-auto"><label class="text-xs text-gray-500 block mb-1">后台登录账号</label><input v-model="config.admin_user" class="bg-gray-900 border border-gray-600 rounded px-3 py-1.5 text-sm text-white outline-none w-full"></div>
            <div class="w-full sm:w-auto"><label class="text-xs text-gray-500 block mb-1">后台登录新密码</label><input type="password" v-model="config.admin_pass" placeholder="留空则不修改密码" class="bg-gray-900 border border-gray-600 rounded px-3 py-1.5 text-sm text-white outline-none w-full"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold text-indigo-400">🖥️ 被控节点 (小鸡) 管理</h2><button @click="addNode" class="bg-indigo-600/20 text-indigo-400 px-3 py-1 rounded hover:bg-indigo-600/40 text-sm transition">+ 新增节点</button></div>
                <div class="space-y-4">
                    <div v-for="(node, index) in config.nodes" :key="index" class="bg-gray-900 p-4 rounded-lg border border-gray-700 relative group">
                        <div class="absolute top-2 right-2 flex gap-2"><button @click="showDeployModal(node)" class="bg-green-600/20 text-green-400 px-2 py-1 rounded text-xs">🚀 一键部署</button><button @click="removeNode(index)" class="text-red-500 opacity-50 hover:opacity-100 text-xs px-1">✖</button></div>
                        <div class="grid grid-cols-2 gap-3 mb-2 mt-6">
                            <div><label class="text-xs text-gray-500">节点 ID (需唯一)</label><input v-model="node.id" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-white"></div>
                            <div><label class="text-xs text-gray-500">显示名称</label><input v-model="node.name" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-white"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-xs text-gray-500">通信 Token</label><input v-model="node.token" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-white"></div>
                            <div><label class="text-xs text-gray-500">到期时间</label><input v-model="node._safe_date" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-white"></div>
                        </div>
                        <div class="mt-3">
                            <label class="text-xs text-gray-500 block mb-1">每月流量上限 (GB，填 0 则隐藏大屏进度条)</label>
                            <input type="number" v-model.number="node._safe_limit" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-white">
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold text-green-400">🎯 全局 Ping 监测目标</h2><button @click="addTask" class="bg-green-600/20 text-green-400 px-3 py-1 rounded hover:bg-green-600/40 text-sm transition">+ 新增目标</button></div>
                <div class="space-y-4">
                    <div v-for="(task, index) in config.ping_tasks" :key="index" class="bg-gray-900 p-4 rounded-lg border border-gray-700 flex items-center gap-3">
                        <div class="flex-1"><label class="text-xs text-gray-500">目标名称</label><input v-model="task.name" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-white"></div>
                        <div class="flex-1"><label class="text-xs text-gray-500">IP或域名</label><input v-model="task.host" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-white"></div>
                        <button @click="removeTask(index)" class="mt-4 text-red-500 hover:text-red-400">✖</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div v-if="deployModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm" @click.self="deployModal = false">
            <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-2xl mx-4 shadow-2xl overflow-hidden">
                <div class="p-4 border-b border-gray-700 bg-gray-900 flex justify-between items-center"><h3 class="font-bold text-gray-200">一键部署指令 - {{ activeNode.name }}</h3><button @click="deployModal = false" class="text-gray-400 hover:text-white">✖</button></div>
                <div class="p-6">
                    <div class="bg-gray-900 p-4 rounded-lg border border-gray-700 font-mono text-sm text-green-400 break-all mb-4 relative">{{ deployCommand }}</div>
                    <button @click="copyCommand" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg shadow">{{ copyText }}</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const { createApp, ref, onMounted, computed } = Vue;
        createApp({
            setup() {
                const config = ref({ site_name: '', admin_user: '', admin_pass: '', nodes: [], ping_tasks: [] });
                const deployModal = ref(false); const activeNode = ref({}); const copyText = ref("🔗 复制一键部署命令");
                
                const loadConfig = async () => { 
                    try { 
                        const res = await fetch('/api/admin/config'); 
                        if (res.ok) { 
                            let d = await res.json(); 
                            if(d.nodes) {
                                d.nodes.forEach(n => { 
                                    if(n.expire_date && String(n.expire_date).includes('|')) {
                                        let parts = String(n.expire_date).split('|');
                                        n._safe_date = parts[0] || '2027/01/01';
                                        n._safe_limit = parseInt(parts[1]) || 0;
                                    } else {
                                        n._safe_date = n.expire_date || '2027/01/01';
                                        n._safe_limit = 0;
                                    }
                                    if (n._safe_date.includes('NaN')) n._safe_date = '2027/01/01';
                                }); 
                            } else { d.nodes = []; }
                            if(!d.ping_tasks) d.ping_tasks = [];
                            config.value = d; 
                        } 
                    } catch(e) {} 
                };
                
                const saveConfig = async () => { 
                    const payload = JSON.parse(JSON.stringify(config.value));
                    payload.nodes.forEach(n => {
                        let d = n._safe_date || '2027/01/01';
                        let l = parseInt(n._safe_limit) || 0;
                        n.expire_date = l > 0 ? (d + '|' + l) : d;
                        delete n._safe_date;
                        delete n._safe_limit;
                    });
                    const res = await fetch('/api/admin/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); 
                    if (res.ok) { alert("✅ 保存成功！完美生效！"); config.value.admin_pass = ''; } else { alert("❌ 保存失败！"); } 
                };
                
                const showDeployModal = (node) => { activeNode.value = node; deployModal.value = true; copyText.value = "🔗 复制一键部署命令"; };
                const deployCommand = computed(() => `curl -sL https://${window.location.host}/install.sh?t=`+Date.now()+` | bash -s -- -s https://${window.location.host} -t ${activeNode.value.token}`);
                const copyCommand = () => { navigator.clipboard.writeText(deployCommand.value); copyText.value = "✅ 复制成功！"; setTimeout(() => copyText.value = "🔗 复制一键部署命令", 2000); };
                const addNode = () => config.value.nodes.push({ id: `node-${Date.now()}`, name: "新节点", token: "secret_" + Math.floor(Math.random()*10000), _safe_date: "2027/01/01", _safe_limit: 1000 });
                const removeNode = (idx) => config.value.nodes.splice(idx, 1);
                const addTask = () => config.value.ping_tasks.push({ name: "新目标", host: "1.1.1.1" });
                const removeTask = (idx) => config.value.ping_tasks.splice(idx, 1);
                onMounted(loadConfig);
                return { config, deployModal, activeNode, copyText, deployCommand, showDeployModal, copyCommand, addNode, removeNode, addTask, removeTask, saveConfig };
            }
        }).mount('#app');
    </script>
</body>
</html>
