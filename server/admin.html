<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probe Admin</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    [v-cloak]{display:none}
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#0f172a;
      color:#e2e8f0;
      font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    .wrap{max-width:1180px;margin:0 auto;padding:24px}
    .card{
      background:rgba(15,23,42,.92);
      border:1px solid rgba(148,163,184,.16);
      border-radius:16px;
      padding:18px;
      box-shadow:0 10px 30px rgba(2,6,23,.28);
      backdrop-filter:blur(10px);
    }
    .mb16{margin-bottom:16px}
    .mb20{margin-bottom:20px}
    .title{
      font-size:13px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#a5b4fc;
      margin-bottom:12px;
    }
    .grid{display:grid;gap:12px}
    .g3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .g2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .lbl{display:block;margin-bottom:6px;color:#94a3b8;font-size:12px}
    .inp,.sel{
      width:100%;
      height:40px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,.18);
      background:#111827;
      color:#e5e7eb;
      padding:0 12px;
      outline:none;
    }
    .inp:focus,.sel:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .row{display:flex;gap:10px;align-items:center}
    .between{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .btn{
      height:38px;
      border:none;
      border-radius:10px;
      padding:0 14px;
      cursor:pointer;
      color:#fff;
      font-weight:700;
      background:#334155;
    }
    .btn:hover{filter:brightness(1.06)}
    .btn-blue{background:#4f46e5}
    .btn-green{background:#059669}
    .btn-red{background:#dc2626}
    .btn-ghost{
      background:rgba(99,102,241,.10);
      color:#c7d2fe;
      border:1px solid rgba(99,102,241,.18);
    }
    .tabs{display:flex;gap:10px;margin:0 0 16px 0}
    .tabs .btn{height:36px}
    .toolbar{
      display:grid;
      grid-template-columns:minmax(220px,1fr) 170px auto;
      gap:10px;
      align-items:center;
      margin-bottom:14px;
    }
    .node-list{display:flex;flex-direction:column;gap:10px}
    .node-row{
      display:grid;
      grid-template-columns:28px minmax(220px,1.1fr) minmax(180px,1fr) minmax(140px,.75fr) minmax(170px,.95fr) auto auto;
      gap:10px;
      align-items:center;
      padding:12px;
      border-radius:12px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(148,163,184,.10);
    }
    .drag-handle{
      cursor:grab;
      color:#94a3b8;
      text-align:center;
      user-select:none;
      font-size:18px;
      line-height:1;
    }
    .node-meta{min-width:0}
    
    .expire-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:78px;
      height:34px;
      padding:0 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      border:1px solid transparent;
    }
    .expire-ok{
      background:rgba(148,163,184,.10);
      border-color:rgba(148,163,184,.20);
      color:#cbd5e1;
    }
    .expire-warn{
      background:rgba(234,179,8,.16);
      border-color:rgba(234,179,8,.32);
      color:#facc15;
    }
    .expire-danger{
      background:rgba(239,68,68,.16);
      border-color:rgba(239,68,68,.32);
      color:#f87171;
    }
    .expire-expired{
      background:rgba(220,38,38,.88);
      border-color:rgba(248,113,113,.50);
      color:#fff;
    }

    .node-meta .sub{
      margin-top:4px;
      color:#64748b;
      font-size:11px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .sortable-ghost{opacity:.35}
    .ping-list{display:flex;flex-direction:column;gap:10px}
    .ping-card{
      padding:12px;
      border-radius:12px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(148,163,184,.10);
    }
    .hint{color:#94a3b8;font-size:12px}
    .empty{
      text-align:center;
      color:#64748b;
      padding:28px 12px;
      font-size:13px;
    }
    .errtxt{color:#f87171;font-size:13px;margin-top:10px}
    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:9999;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
      color:#fff;
      box-shadow:0 12px 30px rgba(0,0,0,.3);
    }
    .toast.ok{background:#059669}
    .toast.err{background:#dc2626}
    @media (max-width: 980px){
      .g3{grid-template-columns:1fr}
      .g2{grid-template-columns:1fr}
      .toolbar{grid-template-columns:1fr}
      .node-row{grid-template-columns:24px 1fr}
      .node-row > *:nth-child(n+3){grid-column:2}
    }
  </style>
</head>
<body>
<div id="app" v-cloak>
  <div class="wrap">
    <div v-if="!authed" class="card" style="max-width:420px;margin:80px auto 0">
      <div class="title">登录管理台</div>
      <div class="mb16">
        <label class="lbl">账号</label>
        <input class="inp" v-model.trim="loginUser" autocomplete="username" placeholder="请输入账号">
      </div>
      <div class="mb16">
        <label class="lbl">密码</label>
        <input class="inp" type="password" v-model="loginPass" autocomplete="current-password" @keyup.enter="doLogin" placeholder="请输入密码">
      </div>
      <button class="btn btn-blue" style="width:100%" @click="doLogin">{{ loginLoading ? '验证中...' : '登录管理台' }}</button>
      <div v-if="loginErr" class="errtxt">{{ loginErr }}</div>
    </div>

    <template v-else>
      <div class="card mb20">
        <div class="title">基础配置</div>
        <div class="grid g3">
          <div>
            <label class="lbl">站点名称</label>
            <input class="inp" v-model.trim="cfg.site_name" placeholder="我的探针">
          </div>
          <div>
            <label class="lbl">管理账号</label>
            <input class="inp" v-model.trim="cfg.admin_user" placeholder="admin">
          </div>
          <div>
            <label class="lbl">修改密码（留空不变）</label>
            <input class="inp" type="password" v-model="cfg.admin_pass" placeholder="留空则不修改">
          </div>
        </div>
        <div style="margin-top:14px">
          <button class="btn btn-blue" @click="saveConfig">保存并动态下发配置</button>
        </div>
      </div>

      <div class="tabs">
        <button class="btn" :class="adminTab==='nodes' ? 'btn-blue' : 'btn-ghost'" @click="switchTab('nodes')">节点管理</button>
        <button class="btn" :class="adminTab==='ping' ? 'btn-green' : 'btn-ghost'" @click="switchTab('ping')">Ping监测</button>
      </div>

      <div v-show="adminTab==='nodes'" class="card mb20">
        <div class="between mb16">
          <div class="title" style="margin:0">被控节点管理 ({{ cfg.nodes.length }}台)</div>
          <button class="btn btn-blue" @click="addNode">+ 新增节点</button>
        </div>

        <div class="toolbar">
          <input class="inp" v-model.trim="nodeKeyword" placeholder="名称 / ID / 到期日期">
          <select class="sel" v-model="nodeSort">
            <option value="manual">手动顺序</option>
            <option value="name_asc">名称 A-Z</option>
            <option value="name_desc">名称 Z-A</option>
            <option value="expire_asc">到期日期升序</option>
            <option value="expire_desc">到期日期降序</option>
          </select>
          <div class="hint">搜索/排序时仅查看，拖拽排序请切回手动顺序。</div>
        </div>

        <div id="node-sortable" class="node-list" v-if="filteredNodes.length > 0">
          <div v-for="(node,idx) in filteredNodes" :key="node.id" class="node-row">
            <div class="drag-handle" title="拖拽排序">⋮⋮</div>

            <div class="node-meta">
              <input class="inp" v-model.trim="node.name" placeholder="节点名称">
              <div class="sub mono">{{ node.id }}</div>
            </div>

            <div style="display:flex;align-items:center;gap:6px;min-width:0">
              <span class="sub" style="min-width:48px;flex:0 0 48px">到期日</span>
              <input class="inp" style="flex:1;min-width:0;width:100%" v-model.trim="node._ed" placeholder="2027/01/01" title="到期日期">
            </div>
            <div style="display:flex;align-items:center;gap:6px;min-width:0">
              <span class="sub" style="min-width:48px;flex:0 0 48px">重置日</span>
              <input class="inp" style="flex:1;min-width:0;width:100%" type="number" min="1" max="28" v-model.number="node._rd" placeholder="1" title="流量重置日">
            </div>
            <div style="display:flex;align-items:center;gap:6px;min-width:0">
              <span class="sub" style="min-width:56px;flex:0 0 56px">月流量</span>
              <input class="inp" style="flex:1;min-width:0;width:100%" type="number" min="0" v-model.number="node._tl" placeholder="0" title="月流量 GB">
            </div>
            <button class="btn btn-green" @click="copyDeploy(node)">部署</button>
            <button class="btn btn-red" @click="removeNodeById(node.id)">删除</button>
          </div>
        </div>

        <div v-if="cfg.nodes.length===0" class="empty">暂无节点，点击“新增节点”</div>
        <div v-else-if="filteredNodes.length===0" class="empty">没有匹配的节点</div>
      </div>

      <div v-show="adminTab==='ping'" class="card">
        <div class="between mb16">
          <div class="title" style="margin:0;color:#6ee7b7">Ping 监测目标 ({{ cfg.ping_tasks.length }}个)</div>
          <button class="btn btn-green" @click="addPing">+ 新增</button>
        </div>
        <div class="hint mb16">TCP 连接探测（端口默认 :80）</div>

        <div class="ping-list" v-if="cfg.ping_tasks.length > 0">
          <div v-for="(t,i) in cfg.ping_tasks" :key="i" class="ping-card">
            <div class="between mb16">
              <strong>目标 #{{ i+1 }}</strong>
              <button class="btn btn-red" style="height:32px" @click="removePing(i)">删除</button>
            </div>
            <div class="grid g2">
              <div>
                <label class="lbl">名称</label>
                <input class="inp" v-model.trim="t.name" placeholder="广东电信">
              </div>
              <div>
                <label class="lbl">IP 或域名</label>
                <input class="inp mono" v-model.trim="t.host" placeholder="gd-ct-v4.ip.zstaticcdn.com">
              </div>
            </div>
          </div>
        </div>

        <div v-else class="empty">暂无 Ping 目标，点击“新增”</div>
      </div>
    </template>
  </div>

  <div v-if="toast.show" :class="['toast', toast.ok ? 'ok' : 'err']">{{ toast.msg }}</div>
</div>

<script>
const {createApp,ref,reactive,computed,onMounted,nextTick} = Vue;

createApp({
  setup(){
    const authed = ref(false);
    const loginUser = ref('');
    const loginPass = ref('');
    const loginErr = ref('');
    const loginLoading = ref(false);

    const adminTab = ref('nodes');
    const nodeKeyword = ref('');
    const nodeSort = ref('manual');

    const toast = reactive({show:false, ok:true, msg:''});
    const cfg = reactive({
      site_name:'',
      admin_user:'admin',
      admin_pass:'',
      nodes:[],
      ping_tasks:[]
    });

    let authHeader = '';
    let sortable = null;

    const showToast = (msg, ok=true) => {
      toast.msg = msg;
      toast.ok = ok;
      toast.show = true;
      setTimeout(() => { toast.show = false; }, 2600);
    };

    const genId = () => 'node-' + Date.now() + Math.floor(Math.random() * 10000);

    const fillCfg = (d) => {
      cfg.site_name = d.site_name || '';
      cfg.admin_user = d.admin_user || 'admin';
      cfg.admin_pass = '';
      cfg.ping_tasks = (d.ping_tasks || []).map(t => ({
        name: t.name || '',
        host: t.host || ''
      }));
      cfg.nodes = (d.nodes || []).map(n => {
        let ed = '2027/01/01', tl = 0, rd = 1;
        const raw = String(n.expire_date || '');
        if (raw.includes('|')) {
          const p = raw.split('|');
          ed = p[0] || '2027/01/01';
          tl = parseInt(p[1], 10) || 0;
          rd = parseInt(p[2], 10) || 1;
        } else {
          ed = raw || '2027/01/01';
        }
        if (!rd || rd < 1) rd = 1;
        if (rd > 28) rd = 28;
        return {
          id: n.id || genId(),
          name: n.name || '',
          token: n.token || '',
          _ed: ed,
          _tl: tl,
          _rd: rd
        };
      });
    };

    const tryAutoLogin = async () => {
      try {
        const saved = sessionStorage.getItem('probe_auth');
        if (!saved) return;
        const r = await fetch('/api/admin/config', {headers:{Authorization:saved}});
        if (!r.ok) {
          sessionStorage.removeItem('probe_auth');
          return;
        }
        authHeader = saved;
        const d = await r.json();
        fillCfg(d);
        authed.value = true;
        await nextTick();
        initSortable();
      } catch (_) {}
    };

    const doLogin = async () => {
      if (!loginUser.value || !loginPass.value) {
        loginErr.value = '账号和密码不能为空';
        return;
      }
      loginLoading.value = true;
      loginErr.value = '';
      try {
        const h = 'Basic ' + btoa(loginUser.value + ':' + loginPass.value);
        const r = await fetch('/api/admin/config', {headers:{Authorization:h}});
        if (r.status === 401) {
          loginErr.value = '账号或密码错误，请重试';
        } else if (r.ok) {
          authHeader = h;
          sessionStorage.setItem('probe_auth', h);
          const d = await r.json();
          fillCfg(d);
          authed.value = true;
          await nextTick();
          initSortable();
        } else {
          loginErr.value = '服务器错误: ' + r.status;
        }
      } catch (e) {
        loginErr.value = '连接失败: ' + e.message;
      }
      loginLoading.value = false;
    };

    const parseDateNum = s => {
      const m = String(s || '').trim().match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
      if (!m) return 99999999;
      return parseInt(m[1], 10) * 10000 + parseInt(m[2], 10) * 100 + parseInt(m[3], 10);
    };

    const parseExpireDays = raw => {
      const s = String(raw || '').trim();
      const m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
      if (!m) return null;
      const y = parseInt(m[1], 10);
      const mo = parseInt(m[2], 10) - 1;
      const d = parseInt(m[3], 10);
      const target = new Date(y, mo, d);
      if (Number.isNaN(target.getTime())) return null;
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const end = new Date(target.getFullYear(), target.getMonth(), target.getDate());
      return Math.floor((end - today) / 86400000);
    };

    const expireBadgeText = n => {
      const days = parseExpireDays(n._ed);
      if (days === null) return '未设';
      if (days <= 0) return '已到期';
      return `余 ${days} 天`;
    };

    const expireBadgeClass = n => {
      const days = parseExpireDays(n._ed);
      if (days === null) return 'expire-ok';
      if (days <= 0) return 'expire-expired';
      if (days <= 3) return 'expire-danger';
      if (days <= 7) return 'expire-warn';
      return 'expire-ok';
    };

    const filteredNodes = computed(() => {
      const kw = nodeKeyword.value.trim().toLowerCase();
      let arr = cfg.nodes.filter(n => {
        if (!kw) return true;
        return String(n.name || '').toLowerCase().includes(kw)
          || String(n.id || '').toLowerCase().includes(kw)
          || String(n._ed || '').toLowerCase().includes(kw);
      });

      if (nodeSort.value === 'name_asc') {
        arr = [...arr].sort((a,b) => String(a.name || '').localeCompare(String(b.name || ''), 'zh-Hans-CN'));
      } else if (nodeSort.value === 'name_desc') {
        arr = [...arr].sort((a,b) => String(b.name || '').localeCompare(String(a.name || ''), 'zh-Hans-CN'));
      } else if (nodeSort.value === 'expire_asc') {
        arr = [...arr].sort((a,b) => parseDateNum(a._ed) - parseDateNum(b._ed));
      } else if (nodeSort.value === 'expire_desc') {
        arr = [...arr].sort((a,b) => parseDateNum(b._ed) - parseDateNum(a._ed));
      }

      return arr;
    });

    const saveConfig = async () => {
      try {
        const nodes = cfg.nodes.map(n => ({
          id: n.id,
          name: n.name,
          token: n.token,
          expire_date: `${n._ed}|${parseInt(n._tl || 0, 10) || 0}|${Math.max(1, Math.min(28, parseInt(n._rd || 1, 10) || 1))}`
        }));

        const r = await fetch('/api/admin/config', {
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'Authorization': authHeader
          },
          body: JSON.stringify({
            site_name: cfg.site_name,
            admin_user: cfg.admin_user,
            admin_pass: cfg.admin_pass || '',
            nodes,
            ping_tasks: cfg.ping_tasks
          })
        });

        if (r.ok) {
          const latest = await fetch('/api/admin/config', {headers:{Authorization:authHeader}});
          if (latest.ok) {
            const d = await latest.json();
            fillCfg(d);
            await nextTick();
            initSortable();
          }
          showToast('✅ 配置已保存并下发！', true);
        } else if (r.status === 401) {
          sessionStorage.removeItem('probe_auth');
          showToast('❌ 会话已过期，请刷新重新登录', false);
        } else {
          showToast('❌ 保存失败: ' + r.status, false);
        }
      } catch (e) {
        showToast('❌ 请求失败: ' + e.message, false);
      }
    };

    const addNode = async () => {
      cfg.nodes.push({
        id: genId(),
        name: '',
        token: 'secret_' + Math.random().toString(36).slice(2,8),
        _ed: '2027/01/01',
        _tl: 0,
        _rd: 1
      });
      nodeKeyword.value = '';
      nodeSort.value = 'manual';
      adminTab.value = 'nodes';
      await nextTick();
      initSortable();
    };

    const removeNode = i => cfg.nodes.splice(i, 1);

    const removeNodeById = id => {
      const i = cfg.nodes.findIndex(n => n.id === id);
      if (i >= 0) cfg.nodes.splice(i, 1);
    };

    const addPing = () => cfg.ping_tasks.push({name:'', host:''});
    const removePing = i => cfg.ping_tasks.splice(i, 1);

    const deployCmd = n => {
      const sid = String(n.id || '').replace('node-','');
      return `curl -sL ${location.origin}/install.sh?t=${sid} | bash -s -- -s ${location.origin} -t ${n.token}`;
    };

    const copyDeploy = n => {
      navigator.clipboard.writeText(deployCmd(n))
        .then(() => showToast('✅ 部署命令已复制！', true))
        .catch(() => showToast('❌ 复制失败', false));
    };

    const switchTab = async (tab) => {
      adminTab.value = tab;
      await nextTick();
      if (tab === 'nodes') initSortable();
    };

    const initSortable = () => {
      const el = document.getElementById('node-sortable');
      if (!el) return;
      if (sortable) sortable.destroy();
      if (nodeKeyword.value || nodeSort.value !== 'manual') return;
      sortable = Sortable.create(el, {
        handle: '.drag-handle',
        animation: 180,
        ghostClass: 'sortable-ghost',
        onEnd: e => {
          const moved = cfg.nodes.splice(e.oldIndex, 1)[0];
          cfg.nodes.splice(e.newIndex, 0, moved);
        }
      });
    };

    onMounted(() => {
      tryAutoLogin();
    });

    return {
      authed, loginUser, loginPass, loginErr, loginLoading,
      adminTab, nodeKeyword, nodeSort, filteredNodes,
      cfg, toast,
      doLogin, saveConfig, addNode, removeNode, removeNodeById,
      addPing, removePing, copyDeploy, switchTab,
      expireBadgeText, expireBadgeClass
    };
  }
}).mount('#app');
</script>
</body>
</html>
